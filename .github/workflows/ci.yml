name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build --parallel
      - name: "Test: State Machine"
        run: cd build && ./test_sm
      - name: "Test: Sensor Validation"
        run: cd build && ./test_sensor
      - name: "Test: Config Loading"
        run: cd build && ./test_config
      - name: "Test: PID Controller"
        run: cd build && ./test_pid
      - name: "Test: Fuel Scheduling"
        run: cd build && ./test_fuel
      - name: "Test: Core ECU Step"
        run: cd build && ./test_core
      - name: "Test: Lookup Maps"
        run: cd build && ./test_map
      - name: "Test: Fault Manager"
        run: cd build && ./test_fault
      - name: "Test: Fuzz"
        run: cd build && ./test_fuzz
      - name: "Test: Performance"
        run: cd build && ./test_perf
      - name: "Test: Scheduler"
        run: cd build && ./test_scheduler
      - name: "Test: Telemetry"
        run: cd build && ./test_telemetry
      - name: "Simulator Smoke Test"
        run: cd build && ./jetecu_sim -d 5 -q

  build-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Configure
        run: CC=clang cmake -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build --parallel
      - name: Run all tests
        run: cd build && ctest --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure with ASan + UBSan
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        run: cmake --build build --parallel
      - name: Run all tests
        run: cd build && ctest --output-on-failure
      - name: Simulator smoke test
        run: cd build && ./jetecu_sim -d 5 -q

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Run clang-tidy
        run: >
          find core/ telemetry/ -name '*.c' |
          xargs clang-tidy -p build --warnings-as-errors='bugprone-*'
        continue-on-error: true
